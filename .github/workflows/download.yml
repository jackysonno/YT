name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب (YouTube URL)'
        required: true
        type: string
      download_type:
        description: 'نوع دانلود (ویدیو یا صدا)'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio
      video_quality:
        description: 'کیفیت ویدیو (تنها در صورت انتخاب video)'
        required: false
        default: 'best (بیشترین کیفیت)'
        type: choice
        options:
          - best (بیشترین کیفیت)
          - 1080p
          - 720p
          - 480p
          - 360p
          - worst (کمترین کیفیت)

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yt-dlp & ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Create output directory
        run: mkdir downloads

      - name: Process and Download Content
        run: |
          URL="${{ github.event.inputs.url }}"
          TYPE="${{ github.event.inputs.download_type }}"
          QUALITY="${{ github.event.inputs.video_quality }}"

          if [ "$TYPE" = "audio" ]; then
            echo "Downloading best available audio in MP3 format..."
            yt-dlp -x --audio-format mp3 --audio-quality 0 -o "downloads/%(title)s.%(ext)s" "$URL"
          else
            echo "Downloading video in MP4 format..."
            
            if [ "$QUALITY" = "worst (کمترین کیفیت)" ]; then
              yt-dlp -f "worstvideo[ext=mp4]+worstaudio[ext=m4a]/worst[ext=mp4]/worst" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "$URL"
            elif [ "$QUALITY" = "360p" ]; then
              yt-dlp -f "bestvideo[height<=360][ext=mp4]+bestaudio[ext=m4a]/best[height<=360][ext=mp4]/best" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "$URL"
            elif [ "$QUALITY" = "480p" ]; then
              yt-dlp -f "bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "$URL"
            elif [ "$QUALITY" = "720p" ]; then
              yt-dlp -f "bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "$URL"
            elif [ "$QUALITY" = "1080p" ]; then
              yt-dlp -f "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080][ext=mp4]/best" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "$URL"
            else
              # Best quality available
              yt-dlp -f "bestvideo+bestaudio/best" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "$URL"
            fi
          fi

      - name: Upload Downloaded File
        uses: actions/upload-artifact@v4
        with:
          name: youtube-media
          path: downloads/
