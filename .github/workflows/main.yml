name: Dynamic YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        default: 'https://www.youtube.com/watch?v=DM8FPq7gs6U'
      type:
        description: 'Download Type'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio
      quality:
        description: 'Quality (For Video: 1080p, 720p, 480p / For Audio: best, 128k)'
        required: true
        default: '1080p'
        type: choice
        options:
          - 'best'
          - '1080p'
          - '720p'
          - '480p'
          - '128k'

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python & Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js (Required for PO Token generator)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install -y ffmpeg
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp yt-dlp-get-pot

      - name: Save Cookies
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Download Content
        run: |
          URL="${{ github.event.inputs.url }}"
          TYPE="${{ github.event.inputs.type }}"
          QUALITY="${{ github.event.inputs.quality }}"

          if [ "$TYPE" = "audio" ]; then
            echo "Downloading Audio..."
            yt-dlp \
              --cookies cookies.txt \
              --get-pot-provider bgutil \
              -f "ba/b" \
              -x --audio-format mp3 \
              "$URL"
          else
            echo "Downloading Video with quality $QUALITY..."
            if [ "$QUALITY" = "best" ]; then
              FORMAT="bv*+ba/b"
            elif [ "$QUALITY" = "1080p" ]; then
              FORMAT="bv*[height<=1080]+ba/b[height<=1080]"
            elif [ "$QUALITY" = "720p" ]; then
              FORMAT="bv*[height<=720]+ba/b[height<=720]"
            else
              FORMAT="bv*[height<=480]+ba/b[height<=480]"
            fi

            yt-dlp \
              --cookies cookies.txt \
              --get-pot-provider bgutil \
              -f "$FORMAT" \
              --merge-output-format mp4 \
              "$URL"
          fi

            yt-dlp \
              --cookies cookies.txt \
              --get-pot \
              -f "$FORMAT" \
              --merge-output-format mp4 \
              "$URL"
          fi

      - name: Upload Downloaded File as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-media
          path: |
            *.mp3
            *.mp4
